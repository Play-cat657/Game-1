<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Street Racing Legends</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="screen"></div>

  <script src="game.js"></script>
</body>
</html>
